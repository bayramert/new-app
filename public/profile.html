<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profilim</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }

    /* ── TOPBAR ── */
    .topbar {
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .topbar-left h1 { font-size: 18px; color: #fff; }
    .back-btn {
      padding: 7px 14px;
      background: transparent;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      color: #aaa;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .back-btn:hover { border-color: #6c63ff; color: #6c63ff; }
    .logout-btn {
      padding: 7px 16px;
      background: transparent;
      border: 1px solid #444;
      border-radius: 8px;
      color: #aaa;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .logout-btn:hover { border-color: #e07070; color: #e07070; }

    /* ── MAIN ── */
    .main { max-width: 960px; margin: 36px auto; padding: 0 20px; display: flex; flex-direction: column; gap: 24px; }

    /* ── PROFIL BAŞLIĞI ── */
    .profile-header {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 28px 32px;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #6c63ff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .profile-info { flex: 1; }
    .profile-fullname { font-size: 22px; font-weight: 700; color: #fff; }
    .profile-sub { font-size: 13px; color: #888; margin-top: 4px; }
    .profile-joined { font-size: 12px; color: #555; margin-top: 6px; }

    /* ── İKİ SÜTUN DÜZEN ── */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    @media (max-width: 640px) { .two-col { grid-template-columns: 1fr; } }

    /* ── KART ── */
    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 24px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── FORM ── */
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .form-group label { font-size: 12px; color: #888; }
    .form-group input {
      padding: 10px 14px;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: #6c63ff; }
    .form-group input::placeholder { color: #444; }

    .submit-btn {
      width: 100%;
      padding: 11px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .submit-btn:hover { background: #574fd6; }
    .submit-btn:disabled { background: #3a3a5a; cursor: not-allowed; }

    /* ── MESAJ ── */
    .msg {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .msg.success { background: #1a3a2a; border: 1px solid #2a6a3a; color: #5ecf8a; display: block; }
    .msg.error   { background: #3a1a1a; border: 1px solid #6a2a2a; color: #e07070; display: block; }

    /* ── SKORLAR ── */
    .scores-section .card-title { margin-bottom: 14px; }
    .scores-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }
    .score-card {
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color 0.2s;
    }
    .score-card:hover { border-color: #6c63ff; }
    .score-game { font-size: 13px; font-weight: 600; color: #fff; }
    .score-label { font-size: 11px; color: #666; }
    .score-value { font-size: 26px; font-weight: 700; color: #6c63ff; }
    .score-date { font-size: 11px; color: #444; margin-top: 4px; }
    .no-scores { color: #555; font-size: 14px; padding: 20px 0; text-align: center; }
  </style>
</head>
<body>

<!-- ── TOPBAR ── -->
<div class="topbar">
  <div class="topbar-left">
    <a class="back-btn" href="/games.html">← Oyunlara Dön</a>
    <h1>👤 Profilim</h1>
  </div>
  <button class="logout-btn" onclick="handleLogout()">Çıkış Yap</button>
</div>

<!-- ── MAIN ── -->
<div class="main">

  <!-- Profil başlığı -->
  <div class="profile-header">
    <div class="avatar" id="avatar">?</div>
    <div class="profile-info">
      <div class="profile-fullname" id="profile-fullname">Yükleniyor...</div>
      <div class="profile-sub" id="profile-sub"></div>
      <div class="profile-joined" id="profile-joined"></div>
    </div>
  </div>

  <!-- Kullanıcı adı + Şifre değiştirme -->
  <div class="two-col">

    <!-- Kullanıcı adı değiştir -->
    <div class="card">
      <div class="card-title">✏️ Kullanıcı Adını Değiştir</div>
      <div class="form-group">
        <label>Yeni Kullanıcı Adı</label>
        <input type="text" id="new-username" placeholder="En az 3 karakter">
      </div>
      <button class="submit-btn" onclick="changeUsername()">Güncelle</button>
      <div class="msg" id="username-msg"></div>
    </div>

    <!-- Şifre değiştir -->
    <div class="card">
      <div class="card-title">🔒 Şifreni Değiştir</div>
      <div class="form-group">
        <label>Mevcut Şifre</label>
        <input type="password" id="current-password" placeholder="Mevcut şifren">
      </div>
      <div class="form-group">
        <label>Yeni Şifre</label>
        <input type="password" id="new-password" placeholder="En az 6 karakter">
      </div>
      <button class="submit-btn" onclick="changePassword()">Güncelle</button>
      <div class="msg" id="password-msg"></div>
    </div>

  </div>

  <!-- Oyun Skorları -->
  <div class="card scores-section">
    <div class="card-title">🎮 Oyun Skorlarım</div>
    <div class="scores-grid" id="scores-grid">
      <div class="no-scores">Yükleniyor...</div>
    </div>
  </div>

</div>

<script>
  // ── Sayfa yüklenince profili getir ──
  async function init() {
    const res = await fetch('/api/users/profile');
    if (!res.ok) { window.location.href = '/'; return; }

    const { user, scores } = await res.json();

    // Avatar (baş harfler)
    const initials = (user.firstName[0] + user.lastName[0]).toUpperCase();
    document.getElementById('avatar').textContent = initials;

    document.getElementById('profile-fullname').textContent =
      user.firstName + ' ' + user.lastName;

    document.getElementById('profile-sub').textContent =
      '@' + user.username + '  ·  ' + user.email;

    const joined = new Date(user.created_at).toLocaleDateString('tr-TR', {
      year: 'numeric', month: 'long', day: 'numeric',
    });
    document.getElementById('profile-joined').textContent = 'Katılım: ' + joined;

    renderScores(scores);
  }

  // ── Skor kartlarını çiz ──
  function renderScores(scores) {
    const grid = document.getElementById('scores-grid');
    if (!scores || scores.length === 0) {
      grid.innerHTML = '<div class="no-scores">Henüz hiçbir oyun oynamadın.</div>';
      return;
    }
    grid.innerHTML = scores.map(s => {
      const date = new Date(s.savedAt).toLocaleDateString('tr-TR', {
        year: 'numeric', month: 'short', day: 'numeric',
      });
      return `
        <div class="score-card">
          <div class="score-game">${s.gameName}</div>
          <div class="score-label">${s.label}</div>
          <div class="score-value">${s.score.toLocaleString('tr-TR')}</div>
          <div class="score-date">Son kayıt: ${date}</div>
        </div>`;
    }).join('');
  }

  // ── Kullanıcı adı değiştir ──
  async function changeUsername() {
    const username = document.getElementById('new-username').value.trim();
    const msgEl    = document.getElementById('username-msg');
    msgEl.className = 'msg';
    msgEl.textContent = '';

    if (!username) { showMsg(msgEl, 'error', 'Kullanıcı adı boş olamaz.'); return; }

    const res = await fetch('/api/users/username', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username }),
    });
    const data = await res.json();

    if (res.ok) {
      showMsg(msgEl, 'success', data.message);
      document.getElementById('new-username').value = '';
      // Profil başlığındaki kullanıcı adını güncelle
      const sub = document.getElementById('profile-sub');
      sub.textContent = sub.textContent.replace(/@\S+/, '@' + username);
    } else {
      showMsg(msgEl, 'error', data.message);
    }
  }

  // ── Şifre değiştir ──
  async function changePassword() {
    const currentPassword = document.getElementById('current-password').value;
    const newPassword     = document.getElementById('new-password').value;
    const msgEl           = document.getElementById('password-msg');
    msgEl.className = 'msg';
    msgEl.textContent = '';

    if (!currentPassword || !newPassword) {
      showMsg(msgEl, 'error', 'Tüm alanları doldur.');
      return;
    }

    const res = await fetch('/api/users/password', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ currentPassword, newPassword }),
    });
    const data = await res.json();

    if (res.ok) {
      showMsg(msgEl, 'success', data.message);
      document.getElementById('current-password').value = '';
      document.getElementById('new-password').value = '';
    } else {
      showMsg(msgEl, 'error', data.message);
    }
  }

  // ── Mesaj göster ──
  function showMsg(el, type, text) {
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  // ── Çıkış ──
  async function handleLogout() {
    await fetch('/api/auth/logout', { method: 'POST' });
    window.location.replace('/');
  }

  init();
</script>

</body>
</html>
