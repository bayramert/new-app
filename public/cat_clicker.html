<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐱 Dans Eden KEDY</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #1a0a2e;
      --surface:   #2d1b4e;
      --surface2:  #3d2660;
      --accent:    #ff6eb4;
      --accent2:   #ffb347;
      --accent3:   #7ee8fa;
      --text:      #f0e6ff;
      --muted:     #9b7ec8;
      --card-glow: 0 0 24px rgba(255,110,180,0.25);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Arka plan yıldızları */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(126,232,250,0.06) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(255,110,180,0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    /* ── TOPBAR ── */
    .topbar {
      background: rgba(45,27,78,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,110,180,0.2);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-title {
      font-family: 'Fredoka One', cursive;
      font-size: 22px;
      color: var(--accent);
      letter-spacing: 1px;
    }
    .back-btn {
      padding: 7px 18px;
      background: transparent;
      border: 1px solid var(--muted);
      border-radius: 20px;
      color: var(--muted);
      font-size: 13px;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── ANA LAYOUT ── */
    .game-wrapper {
      display: grid;
      grid-template-columns: 240px 1fr 260px;
      gap: 20px;
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 20px;
      align-items: start;
    }

    /* ── PANEL (sol/sağ kartlar) ── */
    .panel {
      background: var(--surface);
      border: 1px solid rgba(255,110,180,0.15);
      border-radius: 20px;
      padding: 18px;
      box-shadow: var(--card-glow);
    }
    .panel-title {
      font-family: 'Fredoka One', cursive;
      font-size: 16px;
      color: var(--accent2);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── STATS (sol panel) ── */
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 13px;
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { color: var(--muted); }
    .stat-value { font-weight: 800; color: var(--text); }
    .stat-value.highlight { color: var(--accent); font-size: 15px; }

    /* Upgrades (sol alt) */
    .upgrade-list { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
    .upgrade-btn {
      background: var(--surface2);
      border: 1px solid rgba(255,110,180,0.2);
      border-radius: 12px;
      padding: 10px 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
    }
    .upgrade-btn:hover:not(:disabled) {
      border-color: var(--accent);
      background: rgba(255,110,180,0.1);
      transform: translateX(3px);
    }
    .upgrade-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .upgrade-btn.purchased { border-color: var(--accent3); background: rgba(126,232,250,0.08); }
    .upg-name { font-size: 13px; font-weight: 700; }
    .upg-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .upg-cost { font-size: 12px; color: var(--accent2); font-weight: 700; margin-top: 4px; }

    /* ── MERKEZ ── */
    .center-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* Para sayacı */
    .currency-display {
      text-align: center;
    }
    .currency-amount {
      font-family: 'Fredoka One', cursive;
      font-size: 48px;
      color: var(--accent2);
      text-shadow: 0 0 30px rgba(255,179,71,0.5);
      line-height: 1;
    }
    .currency-label {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }
    .per-sec {
      font-size: 13px;
      color: var(--accent3);
      margin-top: 2px;
    }

    /* Kedi tıklama alanı */
    .cat-container {
      position: relative;
      width: 280px;
      height: 280px;
      cursor: pointer;
      user-select: none;
    }

    .cat-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,110,180,0.12) 0%, transparent 70%);
      border: 3px solid rgba(255,110,180,0.3);
      transition: transform 0.08s ease, box-shadow 0.08s ease;
      display: block;
      /* GIF olmadığında fallback emoji */
    }

    .cat-container:active .cat-img {
      transform: scale(0.92);
      box-shadow: 0 0 40px rgba(255,110,180,0.6);
    }

    /* Tıklama animasyonu — yukarı uçan sayı */
    .click-pop {
      position: absolute;
      font-family: 'Fredoka One', cursive;
      font-size: 22px;
      color: var(--accent2);
      pointer-events: none;
      animation: floatUp 0.9s ease-out forwards;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
      z-index: 10;
    }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-90px) scale(1.4); }
    }

    /* Titreme animasyonu tıklamada */
    @keyframes catShake {
      0%,100% { transform: scale(0.92) rotate(0deg); }
      25%      { transform: scale(0.95) rotate(-4deg); }
      75%      { transform: scale(0.95) rotate(4deg); }
    }
    .cat-img.shaking { animation: catShake 0.15s ease; }

    /* Tıklama butonu metni */
    .click-hint {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }

    /* ── OTO-KLIKER PANEL (sağ) ── */
    .autoclicker-list { display: flex; flex-direction: column; gap: 10px; }
    .auto-item {
      background: var(--surface2);
      border: 1px solid rgba(126,232,250,0.15);
      border-radius: 14px;
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .auto-left { flex: 1; }
    .auto-name { font-size: 13px; font-weight: 700; }
    .auto-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .auto-cost { font-size: 11px; color: var(--accent2); margin-top: 3px; font-weight: 700; }
    .auto-count {
      font-family: 'Fredoka One', cursive;
      font-size: 22px;
      color: var(--accent3);
      min-width: 28px;
      text-align: center;
    }
    .auto-buy-btn {
      padding: 7px 14px;
      background: rgba(126,232,250,0.12);
      border: 1px solid rgba(126,232,250,0.3);
      border-radius: 10px;
      color: var(--accent3);
      font-size: 12px;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .auto-buy-btn:hover:not(:disabled) {
      background: rgba(126,232,250,0.25);
      transform: scale(1.05);
    }
    .auto-buy-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Parlama efekti satın alınınca */
    @keyframes purchasePop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.15); }
      100% { transform: scale(1); }
    }
    .purchase-flash { animation: purchasePop 0.3s ease; }

    /* Responsive */
    @media (max-width: 900px) {
      .game-wrapper { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <span class="topbar-title">🐱 Dans Eden KEDY</span>
  <button class="back-btn" onclick="saveGame().then(() => window.location.href='/games.html')">← Geri Dön</button>
</div>

<div class="game-wrapper">

  <!-- ── SOL PANEL: Stats + Upgrades ── -->
  <div>
    <div class="panel">
      <div class="panel-title">📊 İstatistikler</div>
      <div class="stat-row">
        <span class="stat-label">🐾 Toplam Tıklama</span>
        <span class="stat-value" id="stat-clicks">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">💰 Tık Başına</span>
        <span class="stat-value" id="stat-per-click">1</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">⚡ Toplam Kazanılan</span>
        <span class="stat-value highlight" id="stat-total">0</span>
      </div>
    </div>

    <div class="panel" style="margin-top:16px;">
      <div class="panel-title">⬆️ Geliştirmeler</div>
      <div class="upgrade-list" id="upgrade-list">
        <!-- JS ile doluyor -->
      </div>
    </div>
  </div>

  <!-- ── MERKEZ: Kedi + Sayaç ── -->
  <div class="center-area">
    <div class="currency-display">
      <div class="currency-amount" id="currency">0</div>
      <div class="currency-label">🐟 Balık Pulu</div>
      <div class="per-sec" id="per-sec">0 / saniye</div>
    </div>

    <div class="cat-container" id="cat-container" onclick="handleClick(event)">
      <!--
        GIF YOLU: /images/cat.gif  → kedi gif'ini buraya koy
        Ses için aşağıda JS'deki Audio('/sounds/meow.mp3') kısmına bak
      -->
      <!--
        VİDEO YOLU: /images/cat.webm veya /images/cat.mp4
        Her ikisini de koyarsan tarayıcı desteklediğini seçer.
        ffmpeg dönüşümü için yukarıdaki JS yorumuna bak.
      -->
      <video
        class="cat-img"
        id="cat-video"
        loop
        muted
        playsinline
        preload="auto"
      >
        
        <source src="/images/kedy.mp4"  type="video/mp4">
      </video>
    </div>

    <p class="click-hint">KEDY'e tıkla, balık pulu kazan! 🐠</p>
  </div>

  <!-- ── SAĞ PANEL: Oto-Kliker mağazası ── -->
  <div class="panel">
    <div class="panel-title">🤖 Oto-Tıklayıcılar</div>
    <div class="autoclicker-list" id="auto-list">
      <!-- JS ile doluyor -->
    </div>
  </div>

</div>

<!--
  ═══════════════════════════════════════════════════════
  DOSYA YOLLARI — sadece bu iki satırı değiştirmen yeter:

  VİDEO : /images/cat.webm  (veya .mp4)
  MÜZİK : /sounds/meow.mp3
  ═══════════════════════════════════════════════════════
-->
<audio id="meow-audio" src="/sounds/kedy.mp3" preload="auto" loop></audio>

<script>
// ══════════════════════════════════════════
//  OYUN DURUMU
// ══════════════════════════════════════════
const state = {
  currency:    0,
  totalEarned: 0,
  totalClicks: 0,
  perClick:    1,
  perSecond:   0,
};

const UPGRADES = [
  { id: 'u1', name: '🐾 Keskin Pençe',    desc: 'Tık başına +2 balık',  cost: 50,   bonus: 2,  type: 'click', purchased: false },
  { id: 'u2', name: '🐟 Balık Kokusu',    desc: 'Tık başına +5 balık',  cost: 200,  bonus: 5,  type: 'click', purchased: false },
  { id: 'u3', name: '😼 Yırtıcı Bakış',   desc: 'Tık başına +10 balık', cost: 500,  bonus: 10, type: 'click', purchased: false },
  { id: 'u4', name: '🦁 Aslan Ruhu',      desc: 'Tık başına +25 balık', cost: 2000, bonus: 25, type: 'click', purchased: false },
  { id: 'u5', name: '✨ Altın Patiler',   desc: 'Tık başına ×2 çarpan', cost: 5000, bonus: 0,  type: 'multi', purchased: false },
];

const AUTO_CLICKERS = [
  { id: 'a1', name: '🐭 Fare Avı',        desc: 'Küçük kedi, küçük gelir', cps: 0.5,  baseCost: 15,    count: 0 },
  { id: 'a2', name: '🎣 Balıkçı Kedi',    desc: 'Saatte bol balık',        cps: 3,    baseCost: 100,   count: 0 },
  { id: 'a3', name: '🏭 Mama Fabrikası', desc: 'Endüstriyel kedi maması', cps: 10,   baseCost: 500,   count: 0 },
  { id: 'a4', name: '🚀 Uzay Kedisi',     desc: 'Galaksi çapında avlanma', cps: 40,   baseCost: 2000,  count: 0 },
  { id: 'a5', name: '🌌 Kedi Efendisi',    desc: 'Evrenin efendisi',        cps: 200,  baseCost: 15000, count: 0 },
];

// ══════════════════════════════════════════
//  VİDEO + SES — IDLE TABANLI PAUSE/RESUME
//
//  Mantık:
//    Elle her tıklamada → idleMs = 0  (sayaç sıfırla)
//    Her 50ms'de        → idleMs += 50
//    idleMs >= 3000     → video.pause() + audio.pause()  (kaldığı yerde dur)
//    Sonraki tıklamada  → video.play()  + audio.play()   (kaldığı yerden devam)
//
//  GIF neden çalışmaz: <img> tag'inde GIF'i pause/resume yapmak mümkün değil.
//  Video (webm/mp4) kullan — ffmpeg komutu yukarıdaki yorumda.
// ══════════════════════════════════════════
const IDLE_STOP_MS = 1000;  // Tıklama kesilince kaç ms sonra durur
const TICK_MS      = 50;    // Timer hassasiyeti

let idleMs    = IDLE_STOP_MS; // Başlangıçta zaten durdurulmuş sayılır
let isActive  = false;         // Video/ses şu an çalıyor mu

const meowAudio = document.getElementById('meow-audio');
meowAudio.volume = 0.45;

// Video elementini al (HTML'de tanımlanacak)
function getVideo() { return document.getElementById('cat-video'); }

function resumeActivity() {
  if (isActive) return; // Zaten çalışıyorsa tekrar başlatma
  isActive = true;

  const vid = getVideo();
  if (vid) vid.play().catch(() => {});
  meowAudio.play().catch(() => {});
}

function pauseActivity() {
  if (!isActive) return;
  isActive = false;

  const vid = getVideo();
  if (vid) vid.pause(); // kaldığı yerde bekler
  meowAudio.pause();    // kaldığı yerde bekler
}

// Her 50ms: idle sayacını artır, eşik aşılınca durdur
setInterval(() => {
  if (!isActive) return;
  idleMs += TICK_MS;
  if (idleMs >= IDLE_STOP_MS) pauseActivity();
}, TICK_MS);

// ══════════════════════════════════════════
//  TIKLAMA (ELLE)
// ══════════════════════════════════════════
function handleClick(e) {
  const earned = state.perClick;
  state.currency    += earned;
  state.totalEarned += earned;
  state.totalClicks += 1;

  // Her tıklamada idle sayacını sıfırla
  idleMs = 0;

  // Duruyorsa kaldığı yerden devam ettir
  resumeActivity();

  spawnPop(e, earned);
  updateUI();
}

// Tıklanan noktada yukarı uçan rakam
function spawnPop(e, value) {
  const container = document.getElementById('cat-container');
  const rect = container.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const pop = document.createElement('div');
  pop.className = 'click-pop';
  pop.textContent = '+' + fmt(value);
  pop.style.left = (x - 20) + 'px';
  pop.style.top  = (y - 20) + 'px';
  container.appendChild(pop);
  setTimeout(() => pop.remove(), 900);
}

// ══════════════════════════════════════════
//  OTO-KLIKER SATIN AL
// ══════════════════════════════════════════
function buyAuto(id) {
  const item = AUTO_CLICKERS.find(a => a.id === id);
  const cost = getAutoCost(item);
  if (state.currency < cost) return;

  state.currency  -= cost;
  item.count      += 1;
  recalcPerSecond();
  updateUI();
  renderAutoList();
  saveGame();
  // Parıltı efekti
  const btn = document.getElementById('abtn-' + id);
  if (btn) { btn.classList.add('purchase-flash'); setTimeout(() => btn.classList.remove('purchase-flash'), 300); }
}

// Her satın almada fiyat 1.15x artar
function getAutoCost(item) {
  return Math.floor(item.baseCost * Math.pow(1.15, item.count));
}

function recalcPerSecond() {
  state.perSecond = AUTO_CLICKERS.reduce((sum, a) => sum + a.cps * a.count, 0);
}

// ══════════════════════════════════════════
//  UPGRADE SATIN AL
// ══════════════════════════════════════════
function buyUpgrade(id) {
  const upg = UPGRADES.find(u => u.id === id);
  if (!upg || upg.purchased || state.currency < upg.cost) return;

  state.currency -= upg.cost;
  upg.purchased   = true;
  saveGame();
  if (upg.type === 'click') state.perClick += upg.bonus;
  if (upg.type === 'multi') state.perClick *= 2;

  updateUI();
  renderUpgradeList();
}

// ══════════════════════════════════════════
//  OTO-KAZANÇ LOOP (saniyede çalışır)
// ══════════════════════════════════════════
setInterval(() => {
  if (state.perSecond <= 0) return;
  const earned = state.perSecond / 20; // 50ms'de bir çalışıyor → 1/20 oranı
  state.currency    += earned;
  state.totalEarned += earned;
  updateCurrencyDisplay();
  updateAutoButtons();
  updateUpgradeButtons();
}, 50);

// ══════════════════════════════════════════
//  UI RENDER
// ══════════════════════════════════════════
function fmt(n) {
  n = Math.floor(n);
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'G';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return n.toString();
}

function updateCurrencyDisplay() {
  document.getElementById('currency').textContent = fmt(state.currency);
  document.getElementById('per-sec').textContent  =
    state.perSecond > 0 ? fmt(state.perSecond) + ' / saniye' : '';
}

function updateUI() {
  updateCurrencyDisplay();
  document.getElementById('stat-clicks').textContent    = fmt(state.totalClicks);
  document.getElementById('stat-per-click').textContent = fmt(state.perClick);
  document.getElementById('stat-total').textContent     = fmt(state.totalEarned);
  updateAutoButtons();
  updateUpgradeButtons();
}

function updateAutoButtons() {
  AUTO_CLICKERS.forEach(item => {
    const btn = document.getElementById('abtn-' + item.id);
    if (btn) btn.disabled = state.currency < getAutoCost(item);
  });
}

function updateUpgradeButtons() {
  UPGRADES.forEach(upg => {
    const btn = document.getElementById('ubtn-' + upg.id);
    if (btn && !upg.purchased) btn.disabled = state.currency < upg.cost;
  });
}

// ── Oto liste ──
function renderAutoList() {
  const list = document.getElementById('auto-list');
  list.innerHTML = AUTO_CLICKERS.map(item => {
    const cost = getAutoCost(item);
    return `
      <div class="auto-item">
        <div class="auto-left">
          <div class="auto-name">${item.name}</div>
          <div class="auto-desc">${item.desc} · ${item.cps} pul/sn</div>
          <div class="auto-cost">💰 ${fmt(cost)} pul</div>
        </div>
        <div class="auto-count">${item.count}</div>
        <button
          class="auto-buy-btn"
          id="abtn-${item.id}"
          onclick="buyAuto('${item.id}')"
          ${state.currency < cost ? 'disabled' : ''}
        >AL</button>
      </div>
    `;
  }).join('');
}

// ── Upgrade liste ──
function renderUpgradeList() {
  const list = document.getElementById('upgrade-list');
  list.innerHTML = UPGRADES.map(upg => `
    <button
      class="upgrade-btn ${upg.purchased ? 'purchased' : ''}"
      id="ubtn-${upg.id}"
      onclick="buyUpgrade('${upg.id}')"
      ${upg.purchased || state.currency < upg.cost ? 'disabled' : ''}
    >
      <div class="upg-name">${upg.name} ${upg.purchased ? '✅' : ''}</div>
      <div class="upg-desc">${upg.desc}</div>
      ${!upg.purchased ? `<div class="upg-cost">💰 ${fmt(upg.cost)} pul</div>` : ''}
    </button>
  `).join('');
}

// ══════════════════════════════════════════
//  KAYDET / YÜKLE
// ══════════════════════════════════════════
const GAME_ID    = 'cat-clicker';
const SAVE_EVERY = 10_000; // 10 saniyede bir otomatik kaydet

function buildSaveData() {
  return {
    state: {
      currency:    Math.floor(state.currency),
      totalEarned: Math.floor(state.totalEarned),
      totalClicks: state.totalClicks,
      perClick:    state.perClick,
    },
    upgrades:    UPGRADES.map(u => ({ id: u.id, purchased: u.purchased })),
    autoClickers: AUTO_CLICKERS.map(a => ({ id: a.id, count: a.count })),
  };
}

async function saveGame() {
  try {
    await fetch(`/api/games/save/${GAME_ID}`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ data: buildSaveData() }),
    });
  } catch { /* sessizce geç */ }
}

async function loadGame() {
  try {
    const res  = await fetch(`/api/games/save/${GAME_ID}`);
    if (!res.ok) return;
    const { save } = await res.json();
    if (!save) return; // İlk kez oynuyor, default state ile başla

    // State'i geri yükle
    Object.assign(state, save.state);

    // Upgrade'leri geri yükle
    save.upgrades.forEach(({ id, purchased }) => {
      const upg = UPGRADES.find(u => u.id === id);
      if (!upg || !purchased) return;
      upg.purchased = true;
      if (upg.type === 'click') state.perClick += upg.bonus;
      if (upg.type === 'multi') state.perClick *= 2;
    });
    // perClick save'den geldiği için upgrade bonuslarını tekrar eklememek adına
    // save.state.perClick'i direkt kullan — yukarıdaki Object.assign zaten yazdı
    // Upgrade'ler sadece purchased flag'ini restore etmek için işlendi (bonus hesaplanmadan)
    state.perClick = save.state.perClick; // override: kayıtlı değer kesin

    // Auto-clicker count'larını geri yükle
    save.autoClickers.forEach(({ id, count }) => {
      const item = AUTO_CLICKERS.find(a => a.id === id);
      if (item) item.count = count;
    });

    recalcPerSecond();
  } catch { /* sessizce geç */ }
}

// Sayfa kapanırken/yenilenirken kaydet
window.addEventListener('beforeunload', saveGame);

// 10 saniyede bir otomatik kaydet
setInterval(saveGame, SAVE_EVERY);

// ══════════════════════════════════════════
//  BAŞLAT
// ══════════════════════════════════════════
async function init() {
  await loadGame();      // Önce sunucudan yükle
  renderAutoList();
  renderUpgradeList();
  updateUI();
}

init();
</script>
